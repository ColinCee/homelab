services:
  postgres:
    image: pgvector/pgvector:0.8.2-pg17-trixie@sha256:65825bc6b0af32c347ac8c244a429b3dc88337c9e4390ed9f3f2778aeb675977
    restart: unless-stopped
    ports:
      - "100.100.146.119:5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:?}
      - POSTGRES_USER=${POSTGRES_USER:?}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?}
    shm_size: 256mb
    mem_limit: 4g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - knowledge-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  ingest:
    profiles: [ingest]
    build:
      context: .
      dockerfile: app/Dockerfile
    mem_limit: 2g
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${POSTGRES_DB:?}
      - PGUSER=${POSTGRES_USER:?}
      - PGPASSWORD=${POSTGRES_PASSWORD:?}
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:?}
    volumes:
      - ${NOTES_DIR:-/home/colin/code/notes}:/notes:ro
    depends_on:
      postgres:
        condition: service_healthy

  save:
    profiles: [save]
    build:
      context: .
      dockerfile: app/Dockerfile
    mem_limit: 1g
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - PGHOST=postgres
      - PGPORT=5432
      - PGDATABASE=${POSTGRES_DB:?}
      - PGUSER=${POSTGRES_USER:?}
      - PGPASSWORD=${POSTGRES_PASSWORD:?}
    volumes:
      - ${NOTES_DIR:-/home/colin/code/notes}:/notes
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  knowledge-data:
