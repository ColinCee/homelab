services:
  backend:
    image: ghcr.io/colincee/flight-tracker-at-home/backend:latest@sha256:5a656e063b99fc00b9410db498506493e645ab700fe87e8c9d63339df67fb35e
    restart: unless-stopped
    expose:
      - "8000"
    volumes:
      - heatmap-data:/app/data
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-https://flight-tracker-at-home.pages.dev}
      - CACHE_TTL=${CACHE_TTL:-10}
      - HEATMAP_DB_PATH=/app/data/historical_heatmap.parquet

  cloudflared:
    image: cloudflare/cloudflared:2026.5.2@sha256:12ff5c6992a9863db4da270746af7c244bcaee49353039af8104268a18d6c4f0
    restart: unless-stopped
    command: tunnel run --token ${TUNNEL_TOKEN:?}
    depends_on:
      - backend

volumes:
  heatmap-data:
