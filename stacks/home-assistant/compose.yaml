services:
  homeassistant:
    container_name: homeassistant
    image: ghcr.io/home-assistant/home-assistant:2026.4.2
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - >-
          from urllib.request import urlopen; import sys;
          sys.exit(0 if urlopen('http://localhost:8123/', timeout=5).status < 400 else 1)
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./config:/config
      - /etc/localtime:/etc/localtime:ro
      - /run/dbus:/run/dbus:ro # Required for Bluetooth communication
    environment:
      - TZ=Europe/London
    restart: unless-stopped
    cap_add:
      - NET_ADMIN # Required for Bluetooth management
      - NET_RAW # Required for Bluetooth management
    security_opt:
      - apparmor:unconfined # Required for host device access
    network_mode: host
