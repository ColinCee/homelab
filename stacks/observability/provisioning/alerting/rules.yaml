apiVersion: 1
groups:
  - orgId: 1
    name: Infrastructure
    folder: Homelab
    interval: 1m
    rules:
      - uid: high-cpu
        title: High CPU Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 1 - avg(rate(node_cpu_seconds_total{mode="idle",job="integrations/unix"}[5m]))
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 5m
        annotations:
          summary: "CPU usage above 80% for 5 minutes (current: {{ humanizePercentage $value }})"
        labels:
          severity: warning

      - uid: high-ram
        title: High RAM Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: 1 - (node_memory_AvailableBytes{job="integrations/unix"} / node_memory_MemTotal_bytes{job="integrations/unix"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.9]
              refId: C
        for: 5m
        annotations:
          summary: "RAM usage above 90% for 5 minutes (current: {{ humanizePercentage $value }})"
        labels:
          severity: warning

      - uid: high-disk
        title: High Disk Usage
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: >-
                1 - (node_filesystem_avail_bytes{mountpoint="/",job="integrations/unix"}
                / node_filesystem_size_bytes{mountpoint="/",job="integrations/unix"})
              instant: true
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0.8]
              refId: C
        for: 10m
        annotations:
          summary: "Disk usage above 80% (current: {{ humanizePercentage $value }})"
        labels:
          severity: critical

      - uid: knowledge-task-failed
        title: Knowledge Task Failed
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: loki
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: >-
                sum(count_over_time({job="knowledge"} | json | event = `task_completed`
                | status = `failed` [5m])) or vector(0)
              instant: true
              maxDataPoints: 43200
              queryType: instant
              refId: A
          - refId: C
            relativeTimeRange:
              from: 0
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    type: gt
                    params: [0]
              refId: C
        dashboardUid: container-overview
        panelId: 19
        noDataState: OK
        execErrState: Alerting
        for: 0s
        annotations:
          summary: "Knowledge task failure detected in the last 5 minutes"
          description: >-
            A knowledge CLI task exited non-zero. Inspect the Knowledge Task Runs
            panel or query {job="knowledge"} in Loki for the full error output.
        labels:
          severity: critical
