# Squid egress proxy — whitelist-only for the review agent container.
# Only these domains are allowed; everything else is denied.

# Access control
acl allowed_domains dstdomain .github.com
acl allowed_domains dstdomain .githubcopilot.com
acl allowed_domains dstdomain .githubusercontent.com

# Documentation sites
acl allowed_domains dstdomain .python.org
acl allowed_domains dstdomain .docker.com
acl allowed_domains dstdomain .tiangolo.com
acl allowed_domains dstdomain .pydantic.dev
acl allowed_domains dstdomain .grafana.com
acl allowed_domains dstdomain .prometheus.io
acl allowed_domains dstdomain .tailscale.com
acl allowed_domains dstdomain .cloudflare.com
acl allowed_domains dstdomain .stackoverflow.com

# CONNECT method for HTTPS tunneling
acl SSL_ports port 443
acl CONNECT method CONNECT

# Allow HTTPS CONNECT only to whitelisted domains
http_access allow CONNECT SSL_ports allowed_domains

# Allow HTTP to whitelisted domains
http_access allow allowed_domains

# Deny everything else
http_access deny all

# Listen on port 3128
http_port 3128

# Minimal logging
access_log none
cache_log /dev/null

# No caching — we're just a pass-through proxy
cache deny all

# Suppress version string
httpd_suppress_version_string on
