services:
  agent:
    build:
      context: app
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "${TAILSCALE_IP:-100.100.146.119}:8585:8585"
    environment:
      - MODEL=${MODEL:-gpt-5.4}
      - REASONING_EFFORT=${REASONING_EFFORT:-high}
      - GITHUB_APP_ID=${GITHUB_APP_ID:?}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:?}
      - GITHUB_APP_PRIVATE_KEY_PATH=/secrets/github-app.pem
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:?}
      - HTTPS_PROXY=http://proxy:3128
      - HTTP_PROXY=http://proxy:3128
      - NO_PROXY=localhost,127.0.0.1
    volumes:
      - repo-cache:/repo.git
      - ${GITHUB_APP_KEY_FILE:?}:/secrets/github-app.pem:ro
    tmpfs:
      - /reviews:size=512m,uid=1000,gid=1000
      - /tmp:size=64m,uid=1000,gid=1000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal
      - default
    depends_on:
      proxy:
        condition: service_started

  proxy:
    image: ubuntu/squid:6.13-25.04_beta
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    volumes:
      - ./squid.conf:/etc/squid/squid.conf:ro
    tmpfs:
      - /var/spool/squid:size=32m
      - /var/log/squid:size=8m
      - /run:size=8m
    networks:
      - internal
      - default

networks:
  internal:
    internal: true

volumes:
  repo-cache:
