services:
  agent:
    build:
      context: ../..
      dockerfile: stacks/agents/app/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "100.100.146.119:8585:8585"
    environment:
      - MODEL=gpt-5.4
      - REASONING_EFFORT=high
      - WORKTREE_RETENTION_SECONDS=${WORKTREE_RETENTION_SECONDS:-1209600}
      - GITHUB_APP_ID=${GITHUB_APP_ID:?}
      - GITHUB_APP_INSTALLATION_ID=${GITHUB_APP_INSTALLATION_ID:?}
      - GITHUB_APP_PRIVATE_KEY_PATH=/secrets/github-app.pem
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:?}
    volumes:
      - repo-cache:/repo.git
      - reviews:/reviews
      - ${GITHUB_APP_KEY_FILE:-/home/colin/secrets/github-app.pem}:/secrets/github-app.pem:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  repo-cache:
  reviews:
