services:
  agent:
    build:
      context: ../..
      dockerfile: stacks/agents/app/Dockerfile
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
      - SETUID
      - SETGID
    mem_limit: 2g
    cpus: 2.0
    ports:
      - "100.100.146.119:8585:8585"
    environment:
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - MODEL=gpt-5.4
      - REASONING_EFFORT=high
      - COPILOT_GITHUB_TOKEN=${COPILOT_GITHUB_TOKEN:?}
      - AGENT_API_KEY=${AGENT_API_KEY:?}
    volumes:
      - repo-cache:/repo.git
      - reviews:/reviews
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8585/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  repo-cache:
  reviews:
