services:
  crowdsec:
    image: crowdsecurity/crowdsec:v1.7.7
    restart: unless-stopped
    environment:
      COLLECTIONS: "crowdsecurity/linux crowdsecurity/sshd"
      GID: "${DOCKER_GID:-999}"
    volumes:
      - crowdsec-config:/etc/crowdsec
      - crowdsec-data:/var/lib/crowdsec/data
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./acquis.yaml:/etc/crowdsec/acquis.yaml:ro
    ports:
      # CrowdSec API for bouncers
      - "127.0.0.1:8080:8080"
    networks:
      - default
      - monitoring

networks:
  monitoring:
    external: true

volumes:
  crowdsec-config:
  crowdsec-data:
