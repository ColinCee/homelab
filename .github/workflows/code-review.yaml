name: Code Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    # Triggered only by /review comment — no auto-review on PR open.
    # Security: role-gated (OWNER/MEMBER/COLLABORATOR) + bot;
    # fork PRs blocked by the "Block fork PRs" step below (can't
    # check head.repo in the if-condition — issue_comment events
    # don't include PR metadata)
    if: >
      github.event.issue.pull_request &&
      github.event.comment.body == '/review' &&
      (contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.comment.author_association) ||
      github.event.comment.user.login == 'colins-homelab-bot[bot]')
    runs-on: beelink
    permissions:
      contents: read
      pull-requests: read
      issues: write
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: React to /review comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if ! ERROR=$(gh api "/repos/$REPO/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST -f content='eyes' --silent 2>&1); then
            echo "::warning::Could not add eyes reaction to /review comment: $ERROR"
          fi

      - name: Block fork PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_REPO=$(gh api "/repos/$REPO/pulls/$PR_NUMBER" --jq '.head.repo.full_name')
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "::error::Refusing to review fork PR ($HEAD_REPO)"
            exit 1
          fi

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          # Token must outlive the workflow job — the agent runs for 10-30 min
          # after dispatch. Token expires after 1h naturally (GitHub App limit).
          skip-token-revoke: true

      - name: Trigger review on Beelink agent
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --argjson pr "$PR_NUMBER" \
            --arg actor "${{ github.actor }}" \
            --arg token "$APP_TOKEN" \
            '{repo:$repo, pr_number:$pr,
              triggered_by:$actor, github_token:$token}')

          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST "http://100.100.146.119:8585/review" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.AGENT_API_KEY }}" \
            -d "$PAYLOAD" \
            -o /dev/null -w "%{http_code}")

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Agent returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Review dispatched to agent"
