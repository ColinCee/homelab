name: Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # Security gates:
    # - pull_request: skip drafts, block forks via if-condition
    # - issue_comment /review: role-gated (OWNER/MEMBER/COLLABORATOR);
    #   fork PRs blocked by the "Block fork PRs" step below (can't
    #   check head.repo in the if-condition — issue_comment events
    #   don't include PR metadata)
    if: >
      (github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/review' &&
      (contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.comment.author_association) ||
      github.event.comment.user.login == 'colins-homelab-bot[bot]'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: write
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: >-
        ${{ github.event_name == 'issue_comment'
            && github.event.issue.number
            || github.event.pull_request.number }}
    steps:
      - name: React to /review comment
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/$REPO/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST -f content='eyes' --silent

      - name: Block fork PRs on /review
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_REPO=$(gh api "/repos/$REPO/pulls/$PR_NUMBER" --jq '.head.repo.full_name')
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "::error::Refusing to review fork PR ($HEAD_REPO)"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger review on Beelink agent
        run: |
          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST "http://beelink:8585/review" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"pr_number\":$PR_NUMBER}" \
            -o /dev/null -w "%{http_code}")

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Agent returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Review dispatched to agent"
