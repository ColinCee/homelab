name: Code Review

on:
  pull_request:
    types: [opened, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.draft == false) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && github.event.comment.body == '/review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: >-
        ${{ github.event_name == 'issue_comment'
            && github.event.issue.number
            || github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash scripts/fetch-pr-diff.sh

      - name: Review with AI
        env:
          GITHUB_MODELS_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: bash scripts/review-pr.sh

      - name: Post review
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr comment "$PR_NUMBER" --repo "$REPO" --body-file /tmp/review.txt
