name: Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
  issue_comment:
    types: [created]

jobs:
  review:
    # Security gates:
    # - pull_request: skip drafts, block forks via if-condition
    # - issue_comment /review: role-gated (OWNER/MEMBER/COLLABORATOR);
    #   fork PRs blocked by the "Block fork PRs" step below (can't
    #   check head.repo in the if-condition — issue_comment events
    #   don't include PR metadata)
    if: >
      (github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      github.event.comment.body == '/review' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: >-
        ${{ github.event_name == 'issue_comment'
            && github.event.issue.number
            || github.event.pull_request.number }}
    steps:
      - name: Block fork PRs on /review
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_REPO=$(gh api "/repos/$REPO/pulls/$PR_NUMBER" --jq '.head.repo.full_name')
          if [ "$HEAD_REPO" != "$REPO" ]; then
            echo "::error::Refusing to review fork PR ($HEAD_REPO)"
            exit 1
          fi

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Get AI review from Beelink agent
        id: review
        run: |
          curl -sf --max-time 180 \
            -X POST "http://beelink:8585/review" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"pr_number\":$PR_NUMBER}" \
            -o /tmp/review.json

          EVENT=$(jq -r '.event' /tmp/review.json)
          HAS=$(jq '.comments | length > 0' /tmp/review.json)
          echo "event=$EVENT" >> "$GITHUB_OUTPUT"
          echo "has_comments=$HAS" >> "$GITHUB_OUTPUT"

      - name: Post review on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('/tmp/review.json', 'utf8'));

            const review = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: ${{ env.PR_NUMBER }},
              event: data.event,
              body: data.body,
            };

            if (data.comments && data.comments.length > 0) {
              review.comments = data.comments;
            }

            await github.rest.pulls.createReview(review);
            const n = data.comments ? data.comments.length : 0;
            console.log(`✅ Review posted: ${data.event} with ${n} inline comments`);
