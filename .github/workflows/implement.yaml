name: Implement Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  implement:
    # Trigger on 'agent' label or /implement command from authorized users
    if: >
      (github.event_name == 'issues' &&
      github.event.label.name == 'agent') ||
      (github.event_name == 'issue_comment' &&
      !github.event.issue.pull_request &&
      github.event.comment.body == '/implement' &&
      contains(fromJson('["OWNER","MEMBER","COLLABORATOR"]'),
      github.event.comment.author_association))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    env:
      REPO: ${{ github.repository }}
      ISSUE_NUMBER: ${{ github.event.issue.number }}
    steps:
      - name: React to comment
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/$REPO/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST -f content='rocket' --silent

      - name: React to label
        if: github.event_name == 'issues'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "/repos/$REPO/issues/$ISSUE_NUMBER/reactions" \
            --method POST -f content='rocket' --silent

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger implementation on Beelink agent
        env:
          APP_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          PAYLOAD=$(jq -n \
            --arg repo "$REPO" \
            --argjson issue "$ISSUE_NUMBER" \
            --arg actor "${{ github.actor }}" \
            --arg token "$APP_TOKEN" \
            '{repo:$repo, issue_number:$issue,
              triggered_by:$actor, github_token:$token}')

          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST "http://beelink:8585/implement" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            -o /dev/null -w "%{http_code}")

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Agent returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Implementation dispatched to agent"
