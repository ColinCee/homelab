name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "stacks/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        type: choice
        options:
          - all
          - agents
          - knowledge
          - observability
          - flight-tracker
          - home-assistant
          - mqtt
          - crowdsec

concurrency:
  group: deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: beelink
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: detect
        env:
          INPUT_STACK: ${{ inputs.stack }}
        run: scripts/detect-stacks.sh

      - name: Deploy
        if: steps.detect.outputs.stacks != ''
        env:
          STACKS: ${{ steps.detect.outputs.stacks }}
          DEPLOY_REF: ${{ github.sha }}
          DEPLOY_GIT_REF: ${{ github.ref }}
          AGENT_API_KEY: ${{ secrets.AGENT_API_KEY }}
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
          BOT_APP_INSTALLATION_ID: ${{ secrets.BOT_APP_INSTALLATION_ID }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          DISCORD_PRIVATE_WEBHOOK_URL: ${{ secrets.DISCORD_PRIVATE_WEBHOOK_URL }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          KNOWLEDGE_DB_PASSWORD: ${{ secrets.KNOWLEDGE_DB_PASSWORD }}
        run: |
          cd /home/colin/code/homelab
          git fetch --no-tags origin "$DEPLOY_GIT_REF"
          git reset --hard "$DEPLOY_REF"
          scripts/generate-env.sh
          SKIP_DEPLOY_CHECKOUT_SYNC=1 scripts/deploy.sh

      - name: Get commit message
        if: always() && steps.detect.outputs.stacks != ''
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "unknown")
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1
        if: always() && steps.detect.outputs.stacks != ''
        with:
          webhook: ${{ secrets.DISCORD_PRIVATE_WEBHOOK_URL }}
          nocontext: true
          title: Deploy
          url: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}
          description: |
            **Stacks:** ${{ steps.detect.outputs.stacks }}
            **Commit:** ${{ steps.commit.outputs.msg }}
            **Actor:** ${{ github.actor }}
