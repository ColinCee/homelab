name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "stacks/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        type: choice
        options:
          - all
          - agents
          - knowledge
          - observability
          - flight-tracker
          - home-assistant
          - mqtt
          - crowdsec

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: beelink
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: detect
        env:
          INPUT_STACK: ${{ inputs.stack }}
        run: scripts/detect-stacks.sh

      - name: Deploy
        if: steps.detect.outputs.stacks != ''
        env:
          STACKS: ${{ steps.detect.outputs.stacks }}
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
          BOT_APP_INSTALLATION_ID: ${{ secrets.BOT_APP_INSTALLATION_ID }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          DISCORD_PRIVATE_WEBHOOK_URL: ${{ secrets.DISCORD_PRIVATE_WEBHOOK_URL }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: |
          cd /home/colin/code/homelab
          git pull --ff-only
          scripts/generate-env.sh
          scripts/deploy.sh

      - name: Get commit message
        if: always() && steps.detect.outputs.stacks != ''
        id: commit
        run: |
          MSG=$(git log -1 --pretty=%s 2>/dev/null || echo "unknown")
          echo "msg=${MSG}" >> "$GITHUB_OUTPUT"

      - uses: sarisia/actions-status-discord@v1
        if: always() && steps.detect.outputs.stacks != ''
        with:
          webhook: ${{ secrets.DISCORD_PRIVATE_WEBHOOK_URL }}
          title: Deploy
          description: |
            **Stacks:** ${{ steps.detect.outputs.stacks }}
            **Commit:** ${{ steps.commit.outputs.msg }}
            **Actor:** ${{ github.actor }}
