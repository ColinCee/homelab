name: Deploy

on:
  push:
    branches: [main]
    paths:
      - "stacks/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        type: choice
        options:
          - all
          - agents
          - observability
          - flight-tracker
          - home-assistant
          - mqtt
          - crowdsec

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed stacks
        id: detect
        env:
          INPUT_STACK: ${{ inputs.stack }}
        run: scripts/detect-stacks.sh

      - name: Generate .env files
        if: steps.detect.outputs.stacks != ''
        env:
          STACKS: ${{ steps.detect.outputs.stacks }}
          BOT_APP_ID: ${{ secrets.BOT_APP_ID }}
          BOT_APP_INSTALLATION_ID: ${{ secrets.BOT_APP_INSTALLATION_ID }}
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
          DISCORD_PRIVATE_WEBHOOK_URL: ${{ secrets.DISCORD_PRIVATE_WEBHOOK_URL }}
          CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
        run: scripts/generate-env.sh

      - name: Connect to Tailscale
        if: steps.detect.outputs.stacks != ''
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy
        if: steps.detect.outputs.stacks != ''
        env:
          STACKS: ${{ steps.detect.outputs.stacks }}
        run: |
          read -ra stacks <<< "$STACKS"
          remote="/home/colin/code/homelab"
          for stack in "${stacks[@]}"; do
            if [[ -f "stacks/${stack}/.env" ]]; then
              scp -o StrictHostKeyChecking=accept-new \
                "stacks/${stack}/.env" "colin@beelink:${remote}/stacks/${stack}/.env"
            fi
          done
          ssh -o StrictHostKeyChecking=accept-new colin@beelink \
            "${remote}/scripts/deploy.sh ${stacks[*]}"
