name: Fix Review Feedback

on:
  pull_request_review:
    types: [submitted]

jobs:
  fix:
    # Only trigger for REQUEST_CHANGES from the review bot on agent-created PRs
    if: >
      github.event.review.state == 'changes_requested' &&
      github.event.review.user.login == 'homelab-review-bot[bot]' &&
      startsWith(github.event.pull_request.head.ref, 'agent/')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    env:
      REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - name: Check iteration limit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Count bot reviews (each fix cycle produces a new review)
          REVIEW_COUNT=$(gh api "/repos/$REPO/pulls/$PR_NUMBER/reviews" \
            --jq '[.[] | select(.user.login == "homelab-review-bot[bot]" and .state == "CHANGES_REQUESTED")] | length')

          MAX_ITERATIONS=3
          if [ "$REVIEW_COUNT" -ge "$MAX_ITERATIONS" ]; then
            echo "::warning::Hit max fix iterations ($MAX_ITERATIONS). Manual intervention needed."
            gh api "/repos/$REPO/issues/$PR_NUMBER/comments" \
              --method POST \
              -f body="⚠️ Hit maximum fix iterations ($MAX_ITERATIONS). The remaining issues need manual attention." \
              --silent
            exit 0
          fi
          echo "Fix iteration $REVIEW_COUNT/$MAX_ITERATIONS"

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Trigger fix on Beelink agent
        run: |
          HTTP_CODE=$(curl -sf --max-time 30 \
            -X POST "http://beelink:8585/fix" \
            -H "Content-Type: application/json" \
            -d "{\"repo\":\"$REPO\",\"pr_number\":$PR_NUMBER}" \
            -o /dev/null -w "%{http_code}")

          if [ "$HTTP_CODE" != "202" ]; then
            echo "::error::Agent returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Fix accepted by agent (202)"

          # Poll until complete or failed (timeout 30 min)
          for i in $(seq 1 180); do
            sleep 10
            STATUS=$(curl -sf --max-time 10 \
              "http://beelink:8585/review/$PR_NUMBER?repo=$REPO" \
              | jq -r '.status' 2>/dev/null || echo "unknown")

            case "$STATUS" in
              complete) echo "✅ Fix complete"; exit 0 ;;
              failed)   echo "::error::Fix failed on agent"; exit 1 ;;
              *)        echo "⏳ Status: $STATUS ($((i * 10))s elapsed)" ;;
            esac
          done

          echo "::error::Fix timed out after 1800s"
          exit 1
