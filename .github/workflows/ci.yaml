name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Install dependencies
        run: uv sync

      - name: Install agent dependencies
        run: cd stacks/agents/app && uv sync

      - name: Lint (ruff)
        run: cd stacks/agents/app && uv run ruff check .

      - name: Format check (ruff)
        run: cd stacks/agents/app && uv run ruff format --check .

      - name: Type check (ty)
        run: cd stacks/agents/app && uv run ty check .

      - name: Tests (pytest)
        run: cd stacks/agents/app && uv run pytest tests/ -v

      - name: Lint YAML
        run: uv run yamllint -c .yamllint.yaml stacks/

      - name: Lint GitHub Actions
        run: |
          find .github/workflows -name '*.yaml' -o -name '*.yml' | grep -v '.lock.yml' | xargs actionlint

      - name: Validate compose files
        env:
          TAILSCALE_IP: 127.0.0.1
          GITHUB_APP_ID: "0"
          GITHUB_APP_INSTALLATION_ID: "0"
          GITHUB_APP_KEY_FILE: /dev/null
          COPILOT_GITHUB_TOKEN: dummy
        run: |
          for f in stacks/*/compose.yaml; do
            echo "Validating $f..."
            docker compose -f "$f" config --quiet || exit 1
          done
