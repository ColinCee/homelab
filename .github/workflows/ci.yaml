name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Run CI (lint + typecheck + test + validate)
        run: mise run ci

  knowledge-integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:0.8.5-pg17-trixie@sha256:69573b32242ca232f65871d4cb916ba7210a372b9bd74068204c1a9a57bada4f
        env:
          POSTGRES_DB: knowledge
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knowledge -d knowledge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: knowledge
      PGUSER: knowledge
      PGPASSWORD: knowledge
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Run integration tests
        run: mise run test:integration
