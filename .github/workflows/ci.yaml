name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Run CI (lint + typecheck + test + validate)
        run: mise run ci

  knowledge-integration:
    runs-on: ubuntu-24.04
    services:
      postgres:
        image: pgvector/pgvector:0.8.3-pg17-trixie@sha256:3a3147ccd9a0aee952bb69e1acea1eb3cc7183544185b87a662f872cfa47ae3b
        env:
          POSTGRES_DB: knowledge
          POSTGRES_USER: knowledge
          POSTGRES_PASSWORD: knowledge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U knowledge -d knowledge"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGDATABASE: knowledge
      PGUSER: knowledge
      PGPASSWORD: knowledge
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4
      - name: Run integration tests
        run: mise run test:integration
